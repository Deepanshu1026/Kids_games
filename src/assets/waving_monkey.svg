<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Rich UI Gradients -->
    <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#C28759" />
      <stop offset="100%" stop-color="#7A4C2E" />
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#FFDFBA" />
      <stop offset="100%" stop-color="#E8B585" />
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
    
    <style>
      @keyframes wave {
        0% { transform: rotate(0deg); }
        25% { transform: rotate(-25deg); }
        50% { transform: rotate(15deg); }
        75% { transform: rotate(-10deg); }
        100% { transform: rotate(0deg); }
      }
      .waving-arm {
        transform-origin: 140px 115px; /* Perfect shoulder joint pivot point */
        animation: wave 2.5s ease-in-out infinite;
      }
      @keyframes blink {
        0%, 96%, 100% { transform: scaleY(1); }
        98% { transform: scaleY(0.1); }
      }
      .eye {
        transform-origin: center;
        animation: blink 4s infinite;
      }
    </style>
  </defs>

  <!-- Left Arm (Static) -->
  <path d="M 60 120 Q 20 160 45 185" fill="none" stroke="url(#bodyGrad)" stroke-width="22" stroke-linecap="round" filter="url(#shadow)"/>
  <circle cx="45" cy="185" r="16" fill="url(#faceGrad)" />

  <!-- Left Leg -->
  <path d="M 80 150 L 65 195" fill="none" stroke="url(#bodyGrad)" stroke-width="24" stroke-linecap="round"/>
  <ellipse cx="60" cy="195" rx="20" ry="14" fill="url(#faceGrad)" />

  <!-- Right Leg -->
  <path d="M 120 150 L 135 195" fill="none" stroke="url(#bodyGrad)" stroke-width="24" stroke-linecap="round"/>
  <ellipse cx="140" cy="195" rx="20" ry="14" fill="url(#faceGrad)" />

  <!-- Body -->
  <ellipse cx="100" cy="135" rx="48" ry="52" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <!-- Belly -->
  <ellipse cx="100" cy="140" rx="34" ry="40" fill="url(#faceGrad)" />

  <!-- Right Arm (Waving) -->
  <g class="waving-arm" filter="url(#shadow)">
    <!-- Arm segment -->
    <path d="M 130 115 Q 190 70 175 30" fill="none" stroke="url(#bodyGrad)" stroke-width="22" stroke-linecap="round"/>
    <!-- Hand -->
    <circle cx="175" cy="30" r="16" fill="url(#faceGrad)" />
  </g>

  <!-- Left Ear -->
  <circle cx="45" cy="75" r="22" fill="url(#bodyGrad)" />
  <circle cx="45" cy="75" r="14" fill="url(#faceGrad)" />
  
  <!-- Right Ear -->
  <circle cx="155" cy="75" r="22" fill="url(#bodyGrad)" />
  <circle cx="155" cy="75" r="14" fill="url(#faceGrad)" />

  <!-- Head -->
  <circle cx="100" cy="75" r="48" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  
  <!-- Face Base -->
  <path d="M 68 65 Q 100 35 132 65 Q 145 105 100 110 Q 55 105 68 65 Z" fill="url(#faceGrad)" />
  
  <!-- Eyes -->
  <g class="eye" style="transform-origin: 82px 65px;">
      <circle cx="82" cy="65" r="7" fill="#3D2B1F" />
      <circle cx="80" cy="62" r="2.5" fill="white" />
  </g>
  <g class="eye" style="transform-origin: 118px 65px;">
      <circle cx="118" cy="65" r="7" fill="#3D2B1F" />
      <circle cx="116" cy="62" r="2.5" fill="white" />
  </g>
  
  <!-- Snout / Nose Base -->
  <ellipse cx="100" cy="88" rx="22" ry="16" fill="#E0A97C" />
  <!-- Nose Tip -->
  <ellipse cx="100" cy="80" rx="6" ry="4" fill="#3D2B1F" />
  
  <!-- Mouth (Happy Smile) -->
  <path d="M 88 92 Q 100 102 112 92" fill="none" stroke="#3D2B1F" stroke-width="3" stroke-linecap="round" />
</svg>
